name: Deploy Engine

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [knowlyr-gym-released]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy SG API config
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "
            mkdir -p /opt/knowlyr-crew/project/.crew
            cat > /opt/knowlyr-crew/project/.crew/sg_api.yaml <<'EOFCONFIG'
          enabled: true
          api_key: ${{ secrets.CLAUDE_API_KEY }}
          api_base_url: https://api.anthropic.com
          default_model: claude-sonnet-4-20250514
          max_tokens: 8192
          temperature: 1.0
          EOFCONFIG
            chmod 600 /opt/knowlyr-crew/project/.crew/sg_api.yaml
          "

      - name: Deploy WeChat Work config
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "
            mkdir -p /opt/knowlyr-crew/project/.crew
            cat > /opt/knowlyr-crew/project/.crew/wecom.yaml <<'EOFCONFIG'
          corp_id: ${{ secrets.WECOM_CORP_ID }}
          secret: ${{ secrets.WECOM_CORP_SECRET }}
          agent_id: ${{ secrets.WECOM_AGENT_ID }}
          token: ${{ secrets.WECOM_TOKEN }}
          encoding_aes_key: ${{ secrets.WECOM_ENCODING_AES_KEY }}
          default_employee: hr-manager
          EOFCONFIG
            chmod 600 /opt/knowlyr-crew/project/.crew/wecom.yaml
          "

      - name: Snapshot for rollback
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            if [ -d "/opt/knowlyr-crew" ]; then
              /opt/knowlyr-crew/venv/bin/pip freeze > /opt/knowlyr-crew/prev-requirements.txt
              echo "Snapshot saved to /opt/knowlyr-crew/prev-requirements.txt"
            fi
          '

      - name: Update engine & restart
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            /opt/knowlyr-crew/venv/bin/pip install --force-reinstall --no-deps \
              "knowlyr-crew[webhook,execute,openai,id,trajectory] @ git+https://github.com/liuxiaotong/knowlyr-crew.git" \
            && systemctl restart knowlyr-crew \
            && sleep 10 \
            && curl -sf http://localhost:8765/health
          '

      - name: Verify public endpoints
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://crew.knowlyr.com/api/team/agents)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::公开端点 /api/team/agents 返回 $STATUS（期望 200）— 官网 AI 头像可能不显示"
          else
            echo "✓ /api/team/agents 公开访问正常"
          fi

      - name: Rollback on engine failure
        if: failure()
        run: |
          echo "Rolling back to previous version..."
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            if [ -f "/opt/knowlyr-crew/prev-requirements.txt" ]; then
              /opt/knowlyr-crew/venv/bin/pip install -r /opt/knowlyr-crew/prev-requirements.txt
              systemctl restart knowlyr-crew
              echo "Rolled back successfully"
            else
              echo "No prev-requirements.txt found, cannot rollback"
            fi
          '

      - name: Upgrade trajectory packages
        if: github.event_name == 'repository_dispatch'
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            /opt/knowlyr-crew/venv/bin/pip install --upgrade \
              --index-url https://pypi.org/simple/ \
              knowlyr-core knowlyr-sandbox knowlyr-recorder knowlyr-reward knowlyr-hub \
            && systemctl restart knowlyr-crew \
            && sleep 10 \
            && curl -sf http://localhost:8765/health
          '

      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts
            static

      # 员工配置已迁移到 CREW 数据库（config_store.py），不再从 git 仓库同步

      - name: Deploy scripts
        run: |
          scp -i ~/.ssh/deploy_key \
            scripts/audit_employees.py \
            scripts/daily_eval.py \
            scripts/run_daily_eval.sh \
            scripts/health_check.sh \
            root@${{ secrets.DEPLOY_HOST }}:/opt/knowlyr-crew/project/scripts/

      - name: Deploy static assets & reload
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            'mkdir -p /opt/knowlyr-crew/project/static/avatars'
          scp -i ~/.ssh/deploy_key \
            static/avatars/*.webp \
            root@${{ secrets.DEPLOY_HOST }}:/opt/knowlyr-crew/project/static/avatars/
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            chmod +x /opt/knowlyr-crew/project/scripts/run_daily_eval.sh
            systemctl restart knowlyr-crew
            sleep 10
            curl -sf http://localhost:8765/health
          '

      - name: Install crontabs (eval + health check)
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            chmod +x /opt/knowlyr-crew/project/scripts/health_check.sh
            crontab -l 2>/dev/null | grep -v "run_daily_eval\.sh" | grep -v "health_check\.sh" > /tmp/_cron_clean || true
            echo "0 23 * * * /opt/knowlyr-crew/project/scripts/run_daily_eval.sh >> /var/log/knowlyr-crew-eval.log 2>&1" >> /tmp/_cron_clean
            echo "*/10 * * * * /opt/knowlyr-crew/project/scripts/health_check.sh 2>&1" >> /tmp/_cron_clean
            crontab /tmp/_cron_clean
            rm -f /tmp/_cron_clean
          '

      - name: Audit employee config
        id: audit
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            cd /opt/knowlyr-crew/project &&
            /opt/knowlyr-crew/venv/bin/python scripts/audit_employees.py --json
          '

      - name: Notify audit failure
        if: failure() && steps.audit.outcome == 'failure'
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            curl -sf -X POST http://localhost:8765/run/employee/ceo-assistant \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CREW_API_TOKEN}" \
              -d "{\"task\": \"部署后权限审计发现配置问题。请立即检查 GitHub Actions 日志（knowlyr-crew 仓库 Deploy Engine workflow），然后用 send_feishu_dm 通知 Kai 审计结果和需要修复的问题。\", \"format\": \"memo\"}"
          '

      - name: Trigger knowlyr-website rebuild
        run: |
          gh workflow run deploy.yml -R liuxiaotong/knowlyr-website
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
