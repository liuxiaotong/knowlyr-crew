# MCP Server 配置 — 系统级
# 每个 server 通过 stdio transport 连接

servers:
  github:
    command: "docker"
    args: ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    whitelist:
      - "get_pull_request"
      - "get_pull_request_diff"
      - "get_pull_request_files"
      - "get_pull_request_reviews"
      - "get_pull_request_status"
      - "get_pull_request_comments"
      - "list_pull_requests"
      - "list_issues"
      - "get_issue"
      - "get_issue_comments"
      - "list_commits"
      - "get_commit"
      - "get_file_contents"
      - "search_code"
      - "search_issues"
      - "search_repositories"
      - "list_branches"
      - "list_tags"
      - "get_me"
    timeout: 30
    description: "GitHub API (official MCP server, read-only)"

